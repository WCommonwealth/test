<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walar Mail</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.14);
      --glass-highlight: rgba(255,255,255,0.22);
      --accent: #3ecfff;
      --accent2: #a78bfa;
      --accent3: #34d399;
      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
      --bg-deep: #050810;
      --font-main: 'Space Grotesk', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-main); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

    .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-canvas::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(62,207,255,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167,139,250,0.08) 0%, transparent 60%);
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,8,16,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
    .nav-logo-icon {
      width: 26px; height: 26px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: #000;
    }
    .nav-back {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-user-badge {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--accent); letter-spacing: 0.1em;
      padding: 4px 10px; border: 1px solid rgba(62,207,255,0.3);
      border-radius: 20px; background: rgba(62,207,255,0.05);
    }

    /* LAYOUT */
    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      padding-top: 60px;
    }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--glass-border);
      background: rgba(5,8,16,0.6);
      backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      padding: 24px 0;
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .sidebar-label {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); padding: 0 8px;
      margin-bottom: 8px; margin-top: 16px;
    }
    .sidebar-btn {
      width: 100%; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      border-radius: 10px; border: none;
      background: transparent; color: var(--text-secondary);
      font-family: var(--font-main); font-size: 13px;
      cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .sidebar-btn:hover { background: var(--glass-bg); color: var(--text-primary); }
    .sidebar-btn.active { background: rgba(62,207,255,0.1); color: var(--accent); border: 1px solid rgba(62,207,255,0.15); }
    .sidebar-btn .icon { font-size: 15px; width: 20px; text-align: center; }
    .unread-badge {
      margin-left: auto; background: var(--accent); color: #000;
      font-size: 10px; font-weight: 700; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 10px; display: none;
    }
    .compose-btn {
      margin: 0 16px 16px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      color: #000; font-family: var(--font-main);
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .compose-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(62,207,255,0.3); }

    /* MAIN */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    /* PANELS */
    .panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .panel.active { display: flex; }

    .panel-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .panel-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

    /* MESSAGE LIST */
    .msg-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .msg-item {
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer; transition: all 0.2s;
      margin-bottom: 6px; position: relative;
    }
    .msg-item:hover { background: var(--glass-bg); border-color: var(--glass-border); }
    .msg-item.unread { border-color: rgba(62,207,255,0.15); background: rgba(62,207,255,0.04); }
    .msg-item.unread::before {
      content: ''; position: absolute;
      left: 6px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
    }
    .msg-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .msg-from { font-size: 13px; font-weight: 600; }
    .msg-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
    .msg-subject { font-size: 13px; color: var(--text-secondary); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; }

    /* MESSAGE VIEW */
    .msg-view { flex: 1; overflow-y: auto; padding: 28px; display: none; flex-direction: column; gap: 20px; }
    .msg-view.open { display: flex; }
    .msg-view-header {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 20px 24px;
    }
    .msg-view-subject { font-size: 20px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.01em; }
    .msg-view-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .msg-view-meta-item { font-family: var(--font-mono); font-size: 11px; }
    .msg-view-meta-label { color: var(--text-muted); margin-right: 6px; }
    .msg-view-meta-value { color: var(--text-secondary); }
    .msg-view-body {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 24px;
      font-size: 15px; line-height: 1.75; color: var(--text-secondary);
      white-space: pre-wrap;
    }
    .msg-view-actions { display: flex; gap: 10px; }
    .btn-ghost {
      padding: 9px 18px; border-radius: 8px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-secondary); font-family: var(--font-main);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .btn-danger {
      padding: 9px 18px; border-radius: 8px;
      background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.2);
      color: rgba(255,100,100,0.9); font-family: var(--font-main);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(255,60,60,0.15); }

    /* COMPOSE */
    .compose-panel { padding: 28px; overflow-y: auto; }
    .compose-form {
      max-width: 680px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    }
    .compose-form::before {
      content: ''; display: block; height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
      margin: -28px -28px 28px;
      border-radius: 20px 20px 0 0;
    }
    .compose-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.01em; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 7px;
    }
    .form-input, .form-textarea {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text-primary);
      font-family: var(--font-main); font-size: 14px; outline: none;
      transition: all 0.2s;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
    .form-input:focus, .form-textarea:focus {
      border-color: rgba(62,207,255,0.4);
      background: rgba(62,207,255,0.04);
      box-shadow: 0 0 0 3px rgba(62,207,255,0.08);
    }
    .form-textarea { resize: vertical; min-height: 180px; line-height: 1.6; }
    .compose-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-send {
      padding: 12px 28px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #000; font-family: var(--font-main);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-send:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(62,207,255,0.3); }
    .msg-feedback {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 12px; display: none;
    }
    .msg-feedback.error { background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.2); color: rgba(255,100,100,0.9); }
    .msg-feedback.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); color: var(--accent3); }

    /* Datalist */
    datalist { font-family: var(--font-main); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';
  </script>

  <div class="bg-canvas">
    <div class="bg-grid"></div>
  </div>

  <nav>
    <div class="nav-logo">
      <div class="nav-logo-icon">W</div>
      <span>Walar Mail</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="main.html" class="nav-back">← Back</a>
      <div class="nav-user-badge" id="nav-username">—</div>
    </div>
  </nav>

  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="compose-btn" onclick="showPanel('compose')">✦ Compose</button>

      <div class="sidebar-section">
        <div class="sidebar-label">Mailbox</div>
        <button class="sidebar-btn active" id="btn-inbox" onclick="showPanel('inbox')">
          <span class="icon">✉</span> Inbox
          <span class="unread-badge" id="unread-badge">0</span>
        </button>
        <button class="sidebar-btn" id="btn-sent" onclick="showPanel('sent')">
          <span class="icon">↗</span> Sent
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- INBOX PANEL -->
      <div class="panel active" id="panel-inbox">
        <div class="panel-header">
          <div class="panel-title">Inbox</div>
          <div class="panel-count" id="inbox-count">— messages</div>
        </div>
        <div id="inbox-list-view" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
          <div class="msg-list" id="inbox-list"></div>
        </div>
        <div class="msg-view" id="inbox-msg-view">
          <div class="msg-view-header">
            <div class="msg-view-subject" id="view-subject">—</div>
            <div class="msg-view-meta">
              <div class="msg-view-meta-item"><span class="msg-view-meta-label">FROM</span><span class="msg-view-meta-value" id="view-from">—</span></div>
              <div class="msg-view-meta-item"><span class="msg-view-meta-label">DATE</span><span class="msg-view-meta-value" id="view-date">—</span></div>
            </div>
          </div>
          <div class="msg-view-body" id="view-body">—</div>
          <div class="msg-view-actions">
            <button class="btn-ghost" onclick="closeMessage()">← Back</button>
            <button class="btn-ghost" onclick="replyTo()">↩ Reply</button>
            <button class="btn-danger" onclick="deleteMessage()">Delete</button>
          </div>
        </div>
      </div>

      <!-- SENT PANEL -->
      <div class="panel" id="panel-sent">
        <div class="panel-header">
          <div class="panel-title">Sent</div>
          <div class="panel-count" id="sent-count">— messages</div>
        </div>
        <div class="msg-list" id="sent-list"></div>
      </div>

      <!-- COMPOSE PANEL -->
      <div class="panel" id="panel-compose">
        <div class="compose-panel">
          <div class="compose-form">
            <div class="compose-title">New Message</div>
            <div class="form-group">
              <label class="form-label">To</label>
              <input class="form-input" type="text" id="compose-to" placeholder="username" list="users-list" autocomplete="off">
              <datalist id="users-list"></datalist>
            </div>
            <div class="form-group">
              <label class="form-label">Subject</label>
              <input class="form-input" type="text" id="compose-subject" placeholder="(optional)">
            </div>
            <div class="form-group">
              <label class="form-label">Message</label>
              <textarea class="form-textarea" id="compose-body" placeholder="Write your message here..."></textarea>
            </div>
            <div class="compose-actions">
              <button class="btn-send" onclick="sendMessage()">Send Message →</button>
              <button class="btn-ghost" onclick="showPanel('inbox')">Cancel</button>
            </div>
            <div class="msg-feedback" id="compose-feedback"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API = 'https://api.walar.xyz';
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username') || 'Member';
    document.getElementById('nav-username').textContent = username.toUpperCase();

    let currentMsgId = null;
    let inboxData = [];

    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };

    // ── PANELS ──
    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`panel-${name}`).classList.add('active');
      const btn = document.getElementById(`btn-${name}`);
      if (btn) btn.classList.add('active');
      closeMessage();
      if (name === 'inbox') loadInbox();
      if (name === 'sent') loadSent();
      if (name === 'compose') loadUsers();
    }

    // ── FORMAT DATE ──
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
             d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    // ── INBOX ──
    async function loadInbox() {
      const res = await fetch(`${API}/messages/inbox`, { headers });
      inboxData = await res.json();
      const list = document.getElementById('inbox-list');
      const unread = inboxData.filter(m => !m.read).length;

      document.getElementById('inbox-count').textContent = `${inboxData.length} message${inboxData.length !== 1 ? 's' : ''}`;
      const badge = document.getElementById('unread-badge');
      badge.textContent = unread;
      badge.style.display = unread > 0 ? 'inline' : 'none';

      if (inboxData.length === 0) {
        list.innerHTML = '<div class="empty-state">// inbox empty</div>';
        return;
      }

      list.innerHTML = inboxData.map(m => `
        <div class="msg-item ${m.read ? '' : 'unread'}" onclick="openMessage(${m.id})">
          <div class="msg-meta">
            <div class="msg-from">${m.from_user}</div>
            <div class="msg-time">${formatDate(m.created_at)}</div>
          </div>
          <div class="msg-subject">${m.subject}</div>
          <div class="msg-preview">${m.body.substring(0, 80)}${m.body.length > 80 ? '…' : ''}</div>
        </div>
      `).join('');
    }

    // ── OPEN MESSAGE ──
    function openMessage(id) {
      const msg = inboxData.find(m => m.id === id);
      if (!msg) return;
      currentMsgId = id;

      document.getElementById('view-subject').textContent = msg.subject;
      document.getElementById('view-from').textContent = msg.from_user;
      document.getElementById('view-date').textContent = formatDate(msg.created_at);
      document.getElementById('view-body').textContent = msg.body;

      document.getElementById('inbox-list-view').style.display = 'none';
      document.getElementById('inbox-msg-view').classList.add('open');

      if (!msg.read) {
        fetch(`${API}/messages/read/${id}`, { method: 'POST', headers });
        msg.read = 1;
        loadInbox();
      }
    }

    function closeMessage() {
      currentMsgId = null;
      const listView = document.getElementById('inbox-list-view');
      const msgView = document.getElementById('inbox-msg-view');
      if (listView) listView.style.display = 'flex';
      if (msgView) msgView.classList.remove('open');
    }

    async function deleteMessage() {
      if (!currentMsgId) return;
      await fetch(`${API}/messages/${currentMsgId}`, { method: 'DELETE', headers });
      closeMessage();
      loadInbox();
    }

    function replyTo() {
      const msg = inboxData.find(m => m.id === currentMsgId);
      if (!msg) return;
      showPanel('compose');
      document.getElementById('compose-to').value = msg.from_user;
      document.getElementById('compose-subject').value = `Re: ${msg.subject}`;
    }

    // ── SENT ──
    async function loadSent() {
      const res = await fetch(`${API}/messages/sent`, { headers });
      const data = await res.json();
      const list = document.getElementById('sent-list');
      document.getElementById('sent-count').textContent = `${data.length} message${data.length !== 1 ? 's' : ''}`;

      if (data.length === 0) {
        list.innerHTML = '<div class="empty-state">// no sent messages</div>';
        return;
      }

      list.innerHTML = data.map(m => `
        <div class="msg-item">
          <div class="msg-meta">
            <div class="msg-from">→ ${m.to_user}</div>
            <div class="msg-time">${formatDate(m.created_at)}</div>
          </div>
          <div class="msg-subject">${m.subject}</div>
          <div class="msg-preview">${m.body.substring(0, 80)}${m.body.length > 80 ? '…' : ''}</div>
        </div>
      `).join('');
    }

    // ── USERS AUTOCOMPLETE ──
    async function loadUsers() {
      const res = await fetch(`${API}/users`, { headers });
      const users = await res.json();
      document.getElementById('users-list').innerHTML = users.map(u => `<option value="${u}">`).join('');
    }

    // ── SEND ──
    async function sendMessage() {
      const to = document.getElementById('compose-to').value.trim();
      const subject = document.getElementById('compose-subject').value.trim();
      const body = document.getElementById('compose-body').value.trim();
      const feedback = document.getElementById('compose-feedback');
      feedback.style.display = 'none';

      if (!to || !body) {
        feedback.textContent = 'Recipient and message body are required.';
        feedback.className = 'msg-feedback error';
        feedback.style.display = 'block';
        return;
      }

      const res = await fetch(`${API}/messages/send`, {
        method: 'POST', headers,
        body: JSON.stringify({ to, subject, body })
      });
      const data = await res.json();

      if (data.success) {
        feedback.textContent = 'Message sent successfully.';
        feedback.className = 'msg-feedback success';
        feedback.style.display = 'block';
        document.getElementById('compose-to').value = '';
        document.getElementById('compose-subject').value = '';
        document.getElementById('compose-body').value = '';
        setTimeout(() => showPanel('sent'), 1200);
      } else {
        feedback.textContent = data.error;
        feedback.className = 'msg-feedback error';
        feedback.style.display = 'block';
      }
    }

    // ── SOCKET.IO — real-time new messages ──
    if (token) {
      const socket = io(API, { auth: { token }, transports: ['polling'] });
      socket.on('new_message', (msg) => {
        inboxData.unshift(msg);
        loadInbox();
      });
    }

    // Init
    loadInbox();
  </script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</body>
</html>
